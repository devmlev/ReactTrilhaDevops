name: Deploy Web App to MLDEV

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

jobs:
  deploy:
    # Target your specific runner using its labels
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ls .
          npm install

      - name: Build Application
        run: npm run build

      - name: Deploy Application
        run: |
          pm2 delete react-trilha-devops
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing process to delete, continuing..." }
          pm2 serve ./dist --name "react-trilha-devops" --spa
