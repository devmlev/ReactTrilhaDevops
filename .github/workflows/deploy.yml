name: Deploy Web App to MLDEV

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Deploy Application
        run: |
          # Command to restart your web app or copy files
          # Example for a simple Node app:
          # pm2 restart my-web-app || pm2 start app.js --name "my-web-app"
          echo "Deploy step: add your deployment commands here"
